name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: |
            backend/.venv
            ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('backend/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run pytest
        run: poetry run pytest -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint and typecheck
        run: npm run lint

      - name: Production build
        run: npm run build

  e2e:
    name: E2E smoke tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    env:
      AUTH_REQUIRED: "false"
      CONFIG_DIR: ${{ github.workspace }}/config
      DATABASE_URL: sqlite+aiosqlite:///${{ github.workspace }}/backend/ci_e2e.db
      CORS_ORIGINS: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:8000
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install backend dependencies
        working-directory: backend
        run: poetry install --no-interaction

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: backend
        run: |
          poetry run uvicorn src.main:app --host 127.0.0.1 --port 8000 &
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:8000/health && exit 0
            sleep 2
          done
          exit 1

      - name: Build and start frontend
        working-directory: frontend
        run: |
          npm run build
          npm run start -- --hostname 127.0.0.1 --port 3000 &
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:3000 && exit 0
            sleep 2
          done
          exit 1

      - name: Run Playwright smoke tests
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
        run: npm run test:e2e
