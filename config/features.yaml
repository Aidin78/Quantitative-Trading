version: v1
indicators:
  - name: rsi_14
    type: rsi
    params: { period: 14 }
  - name: ema_12
    type: ema
    params: { period: 12 }
  - name: ema_26
    type: ema
    params: { period: 26 }
  - name: atr_14
    type: atr
    params: { period: 14 }
  - name: macd
    type: macd
    params: { fast: 12, slow: 26, signal: 9, component: line }
  - name: macd_signal
    type: macd
    params: { fast: 12, slow: 26, signal: 9, component: signal }
  - name: macd_histogram
    type: macd
    params: { fast: 12, slow: 26, signal: 9, component: histogram }
  - name: macd_histogram_slope
    type: macd
    params: { fast: 12, slow: 26, signal: 9, component: histogram_slope }
  - name: bb_upper
    type: bollinger
    params: { period: 20, std: 2, band: upper }
  - name: bb_lower
    type: bollinger
    params: { period: 20, std: 2, band: lower }
  - name: bb_middle
    type: bollinger
    params: { period: 20, std: 2, band: middle }
  - name: adx_14
    type: adx
    params: { period: 14, component: adx }
  - name: plus_di_14
    type: adx
    params: { period: 14, component: plus_di }
  - name: minus_di_14
    type: adx
    params: { period: 14, component: minus_di }
  - name: supertrend
    type: supertrend
    params: { period: 10, multiplier: 3.0, component: line }
  - name: supertrend_direction
    type: supertrend
    params: { period: 10, multiplier: 3.0, component: direction }
  - name: cmf_20
    type: volume_flow
    params: { period: 20, component: cmf }
  - name: volume_ratio_20
    type: volume_flow
    params: { period: 20, component: volume_ratio }
  - name: close_delta
    type: volume_flow
    params: { component: close_delta }
flags:
  - name: ema_cross_bullish
    expr: "ema_12 > ema_26"
  - name: ema_cross_bearish
    expr: "ema_12 < ema_26"
  - name: macd_bullish
    expr: "macd > macd_signal"
  - name: macd_bearish
    expr: "macd < macd_signal"
context:
  trend: { method: ema_compare, fast: ema_12, slow: ema_26 }
  volatility: { method: atr_pct, atr: atr_14, low: 0.3, high: 1.0 }
  session: { timezone: UTC }
