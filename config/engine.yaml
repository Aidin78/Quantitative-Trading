engine:
  aggregation:
    min_agreeing_providers: 1
    method: majority
  filter:
    min_atr_pct: 0.3
    allowed_sessions:
    - EUROPE
    - US
    - OVERLAP
  risk:
    max_daily_drawdown_pct: 5.0
    max_signals_per_day: 10
    min_confidence: 0.6
    min_risk_reward: 1.0
    max_open_positions: 3
    max_exposure_pct: 50.0
